<button
	oinky-chat="toggle"
	oinky-chat-expanded="{{ isExpanded }}"
	class="absolute right-full btn btn-sm engaged:btn-primary btn-square m-1 indicator"
>
	<div oinky-chat="toggle-indicator" class="indicator-item status status-warning hidden"></div>
	<svg
		class="w-6 h-6 -m-1 transition-transform"
		xmlns="http://www.w3.org/2000/svg"
		viewBox="0 0 20 20"
		fill="currentColor"
	>
		<path
			fill-rule="evenodd"
			d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
			clip-rule="evenodd"
		/>
	</svg>
</button>

<div class="w-xl join">
	<label class="join-item input w-full">
		<span oinky-chat="input-label" class="label text-xs mr-0 px-2" style="display: none"></span>
		<input oinky-chat="input" placeholder="{{ placeholder }}" />
	</label>
	<button
		class="join-item btn not-engaged:bg-base-100 engaged:btn-primary not-engaged:border-base-content/20 px-1"
		popovertarget="oinky-chat-actions"
		style="anchor-name: --oinky-chat-actions-toggle"
	>
		<svg
			xmlns="http://www.w3.org/2000/svg"
			fill="none"
			viewBox="0 0 24 24"
			stroke-width="1.5"
			stroke="currentColor"
			class="size-6"
		>
			<path
				stroke-linecap="round"
				stroke-linejoin="round"
				d="M12 6.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 12.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5ZM12 18.75a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5Z"
			/>
		</svg>
	</button>
</div>

<div
	oinky-chat="messages-container"
	oinky-chat-expanded="{{ isExpanded }}"
	class="contents pointer-events-none"
>
	<ul
		oinky-chat-expanded-hidden
		oinky-chat="popups"
		class="absolute left-0 bottom-full m-1 transition-opacity w-xl"
	></ul>
	<div class="absolute left-0 bottom-full m-1 w-xl rounded-box overflow-hidden transition-opacity">
		<ul
			oinky-chat-expanded-visible
			oinky-chat="messages"
			class="max-h-64 overflow-y-scroll scrollbar-thumb-base-content/50 scrollbar-track-base-200/70"
		>
			{{#messages}} {{{ . }}} {{/messages}}
		</ul>
	</div>
</div>

{{{ renderedChatTabs }}} {{{ renderedChatActions }}} {{{ renderedChatLog }}}

<style>
	[oinky-chat='popups'] li {
		animation-name: fadeOut;
		animation-duration: 150ms;
		animation-delay: 7850ms;
	}

	[oinky-chat-expanded='true'][oinky-chat='toggle'] svg {
		transform: scaleY(1);
	}

	[oinky-chat-expanded='false'][oinky-chat='toggle'] svg {
		transform: scaleY(-1);
	}

	[oinky-chat-expanded='true'] [oinky-chat-expanded-visible],
	[oinky-chat-expanded='false'] [oinky-chat-expanded-hidden] {
		opacity: 1;
	}

	[oinky-chat-expanded='false'] [oinky-chat-expanded-visible],
	[oinky-chat-expanded='true'] [oinky-chat-expanded-hidden] {
		opacity: 0;
	}
</style>

	}

	.chat-tag-investor-plus::before {
		content: '';

		top: 0;
		left: -40%;
		width: 30%;
		height: 100%;
		background: linear-gradient(
			to right,
			rgba(255, 255, 255, 0) 0%,
			rgba(255, 255, 255, 0.5) 50%,
			rgba(255, 255, 255, 0) 100%

		animation: shine 2s infinite;
		transform: skewX(-20deg);
		pointer-events: none;
		z-index: 1;
	}

	.chat-tag-investor-plus span {
		position: relative;
		z-index: 2;
	}

	@keyframes shine {
		0% {
			left: -40%;
		}

		100% {
			left: 100%;
		}
	}
